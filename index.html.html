<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Travel Adventure ✈️</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#1a90d9;--sky2:#0e6fb5;--sun:#FFD700;--cloud:#fff;
  --green:#2ecc71;--red:#e74c3c;--orange:#f39c12;--purple:#9b59b6;
  --pink:#e91e8c;--teal:#00bcd4;
  --card:#fff;--shadow:0 4px 18px rgba(0,0,0,.13);
  --radius:18px;--radius2:12px;
  --font:'Segoe UI',Arial,sans-serif;
}
body{font-family:var(--font);background:linear-gradient(160deg,#e0f4ff 0%,#f9f0ff 100%);min-height:100vh;overflow-x:hidden}
#app{max-width:860px;margin:0 auto;padding:12px}

/* Header */
.header{background:linear-gradient(135deg,#1a90d9,#9b59b6);border-radius:var(--radius);padding:16px 22px;margin-bottom:18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.header h1{color:#fff;font-size:clamp(1.3rem,4vw,2rem);font-weight:800;text-shadow:1px 2px 6px rgba(0,0,0,.2)}
.header .plane-icon{font-size:2.4rem;animation:float 2.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-8px) rotate(5deg)}}

/* Steps indicator */
.steps{display:flex;gap:4px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.step-dot{min-width:32px;height:32px;border-radius:50%;background:#d0e8ff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#555;transition:.3s;cursor:default;border:2px solid #b0d4f5;flex-shrink:0}
.step-dot.active{background:var(--sky);color:#fff;border-color:#0e6fb5;transform:scale(1.18);box-shadow:0 0 0 4px rgba(26,144,217,.2)}
.step-dot.done{background:var(--green);color:#fff;border-color:#27ae60}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:16px}
.card h2{font-size:1.4rem;color:#1a3a5c;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h2 .icon{font-size:1.6rem}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:50px;border:none;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 3px 10px rgba(0,0,0,.12)}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#1a90d9,#0e6fb5);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#1577b8,#0a5a94)}
.btn-green{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.btn-orange{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff}
.btn-red{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
.btn-purple{background:linear-gradient(135deg,#9b59b6,#7d3c98);color:#fff}
.btn-sm{padding:8px 16px;font-size:.85rem}
.btn-restart{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;position:fixed;bottom:18px;right:18px;z-index:999;border-radius:50px;box-shadow:0 4px 16px rgba(231,76,60,.4)}

/* Inputs */
.input-group{margin-bottom:14px}
.input-group label{display:block;font-weight:700;color:#1a3a5c;margin-bottom:5px;font-size:.95rem}
.input-group input, .input-group select{width:100%;padding:12px 16px;border-radius:var(--radius2);border:2px solid #c9e4fa;font-size:1rem;transition:.2s;background:#f8fbff}
.input-group input:focus, .input-group select:focus{border-color:var(--sky);outline:none;background:#fff}

/* Avatar grid */
.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:12px;margin:12px 0}
.avatar-option{border:3px solid transparent;border-radius:var(--radius2);padding:8px;cursor:pointer;text-align:center;transition:.2s;background:#f0f8ff}
.avatar-option:hover{border-color:#90c8f5;background:#e0f0ff}
.avatar-option.selected{border-color:var(--sky);background:#d0eaff;box-shadow:0 0 0 3px rgba(26,144,217,.2)}
.avatar-option .av{font-size:3rem;line-height:1}
.avatar-option span{display:block;font-size:.72rem;font-weight:600;color:#444;margin-top:2px}

/* Destination cards */
.dest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.dest-card{border:3px solid #d0e8ff;border-radius:var(--radius);padding:14px;text-align:center;cursor:pointer;transition:.25s;background:#f8fcff;position:relative;overflow:hidden}
.dest-card:hover{border-color:var(--sky);transform:translateY(-4px);box-shadow:0 8px 24px rgba(26,144,217,.15)}
.dest-card.selected{border-color:var(--sky);background:#e0f0ff;box-shadow:0 0 0 4px rgba(26,144,217,.2)}
.dest-card .flag{font-size:2.4rem;line-height:1;margin-bottom:4px}
.dest-card .landmark{font-size:2rem;margin:4px 0}
.dest-card h3{font-size:.95rem;font-weight:800;color:#1a3a5c;margin-bottom:4px}
.dest-card p{font-size:.78rem;color:#555;line-height:1.4}
.dest-card .weather{font-size:1.2rem;position:absolute;top:8px;right:8px}

/* Transport */
.transport-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.transport-card{border:3px solid #d0e8ff;border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;transition:.25s;background:#f8fcff}
.transport-card:hover{border-color:var(--sky);transform:translateY(-4px);box-shadow:0 8px 24px rgba(26,144,217,.15)}
.transport-card.selected{border-color:var(--sky);background:#e0f0ff}
.transport-card .t-icon{font-size:3rem;margin-bottom:8px}
.transport-card h3{font-size:1.1rem;font-weight:800;color:#1a3a5c}
.transport-card p{font-size:.8rem;color:#777;margin-top:4px}

/* Flights */
.flight-card{border:2px solid #d0e8ff;border-radius:var(--radius2);padding:16px;margin-bottom:10px;cursor:pointer;transition:.2s;background:#f8fcff;display:flex;align-items:center;gap:16px}
.flight-card:hover{border-color:var(--sky);background:#e8f4ff}
.flight-card.selected{border-color:var(--sky);background:#d0eaff;box-shadow:0 0 0 3px rgba(26,144,217,.2)}
.flight-num{background:linear-gradient(135deg,#1a90d9,#0e6fb5);color:#fff;padding:6px 14px;border-radius:50px;font-size:.85rem;font-weight:700}
.flight-route{flex:1;font-size:1rem;font-weight:700;color:#1a3a5c}
.flight-time{color:#555;font-size:.9rem}

/* Seat map */
.seat-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:.82rem;font-weight:600}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-box{width:18px;height:18px;border-radius:4px}
.seat-map{background:#e8f4ff;border-radius:var(--radius2);padding:14px;overflow-x:auto}
.plane-nose{text-align:center;font-size:2rem;margin-bottom:8px}
.seat-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;justify-content:center}
.seat-row .row-num{width:22px;font-size:.78rem;font-weight:700;color:#777;text-align:right;flex-shrink:0}
.seat{width:36px;height:36px;border-radius:6px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;cursor:pointer;transition:.2s;flex-shrink:0}
.seat.aisle-gap{width:14px;background:transparent;border:none;cursor:default}
.seat.avail{background:#c8f5c8;border-color:#27ae60;color:#1a5c2a}
.seat.avail:hover{background:#a0eaa0;transform:scale(1.1)}
.seat.taken{background:#f5c8c8;border-color:#e74c3c;color:#7a1a1a;cursor:not-allowed}
.seat.selected-seat{background:#1a90d9;border-color:#0e6fb5;color:#fff;transform:scale(1.15);box-shadow:0 0 0 3px rgba(26,144,217,.3)}
.seat-type-label{font-size:.7rem;color:#777;text-align:center;font-weight:700;margin-bottom:2px}

/* Suitcase */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;margin-bottom:14px}
.item-card{border:2px solid #d0e8ff;border-radius:var(--radius2);padding:10px;text-align:center;cursor:grab;transition:.2s;background:#f8fcff;user-select:none}
.item-card:hover{border-color:var(--sky);background:#e0f0ff;transform:translateY(-2px)}
.item-card.dragging{opacity:.5;cursor:grabbing}
.item-card .i-icon{font-size:2rem;line-height:1}
.item-card span{display:block;font-size:.72rem;font-weight:600;color:#444;margin-top:3px}
.suitcase-drop{min-height:130px;border:3px dashed #90c8f5;border-radius:var(--radius);padding:14px;background:#f0f8ff;transition:.2s;position:relative}
.suitcase-drop.dragover{border-color:var(--sky);background:#d0eaff}
.suitcase-drop h3{font-size:.9rem;color:#777;text-align:center;margin-bottom:8px}
.packed-items{display:flex;flex-wrap:wrap;gap:8px}
.packed-item{background:#e0eeff;border-radius:8px;padding:6px 10px;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:4px;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.feedback-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#fff;border-radius:50px;padding:12px 24px;box-shadow:0 4px 20px rgba(0,0,0,.15);font-size:1rem;font-weight:700;z-index:9999;animation:toastAnim .4s ease;pointer-events:none}
@keyframes toastAnim{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.feedback-toast.good{color:#27ae60;border:2px solid #a0e0a0}
.feedback-toast.bad{color:#e74c3c;border:2px solid #f5a0a0}

/* Check-in quiz */
.quiz-question{font-size:1.15rem;font-weight:700;color:#1a3a5c;margin-bottom:14px;line-height:1.5}
.quiz-options{display:grid;gap:10px}
.quiz-opt{padding:14px 18px;border:2px solid #d0e8ff;border-radius:var(--radius2);cursor:pointer;font-size:.98rem;font-weight:600;transition:.2s;background:#f8fcff}
.quiz-opt:hover{border-color:var(--sky);background:#e0f0ff}
.quiz-opt.correct{background:#c8f5c8;border-color:#27ae60;color:#1a5c2a}
.quiz-opt.wrong{background:#f5c8c8;border-color:#e74c3c;color:#7a1a1a}
.quiz-progress{font-size:.85rem;color:#777;margin-bottom:10px;font-weight:600}
.quiz-score{font-size:1.4rem;font-weight:800;color:var(--sky);text-align:center;margin:10px 0}

/* Boarding pass */
.boarding-pass{background:linear-gradient(135deg,#1a3a6c,#2a5298);border-radius:22px;padding:22px;color:#fff;position:relative;overflow:hidden;max-width:500px;margin:0 auto;box-shadow:0 8px 32px rgba(26,58,108,.3)}
.bp-airline{font-size:1.1rem;font-weight:800;letter-spacing:2px;color:#90c8f5;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.bp-route{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.bp-city{text-align:center}
.bp-iata{font-size:2rem;font-weight:900;line-height:1}
.bp-cityname{font-size:.72rem;color:#90c8f5;margin-top:2px}
.bp-arrow{font-size:1.6rem;color:#FFD700}
.bp-details{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.bp-field{background:rgba(255,255,255,.08);border-radius:10px;padding:8px 10px}
.bp-field label{font-size:.65rem;color:#90c8f5;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:2px}
.bp-field span{font-size:.92rem;font-weight:700}
.bp-divider{border:none;border-top:2px dashed rgba(255,255,255,.2);margin:14px 0}
.bp-bottom{display:flex;align-items:center;gap:14px}
.bp-avatar{width:64px;height:64px;border-radius:50%;background:#e0f0ff;border:3px solid #90c8f5;display:flex;align-items:center;justify-content:center;font-size:2.4rem;overflow:hidden;flex-shrink:0}
.bp-avatar img{width:100%;height:100%;object-fit:cover}
.bp-pax{flex:1}
.bp-pax-name{font-size:1.15rem;font-weight:800}
.bp-pax-info{font-size:.78rem;color:#90c8f5;margin-top:2px}
.bp-qr{width:64px;height:64px;background:#fff;border-radius:8px;padding:4px;flex-shrink:0}
.bp-gate{background:linear-gradient(135deg,#FFD700,#f39c12);color:#1a3a6c;font-size:1.3rem;font-weight:900;padding:8px 16px;border-radius:12px;text-align:center;margin-top:12px}
.bp-stripe{position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#FFD700,#e91e8c,#1a90d9,#2ecc71,#FFD700);background-size:200%}

/* Takeoff */
.takeoff-screen{text-align:center;padding:30px 10px}
.takeoff-plane{font-size:4rem;animation:takeoffAnim 3s ease-in-out infinite}
@keyframes takeoffAnim{0%{transform:translateX(-80px) translateY(20px) rotate(-10deg);opacity:.4}50%{transform:translateX(30px) translateY(-30px) rotate(5deg);opacity:1}100%{transform:translateX(150px) translateY(-60px) rotate(10deg);opacity:.3}}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:14px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{top:-20px;transform:rotate(0deg) translateX(0)}100%{top:110vh;transform:rotate(720deg) translateX(80px)}}
.takeoff-msg{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#1a90d9,#9b59b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:20px 0}
.dest-showcase{font-size:5rem;margin:16px 0;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Vocab popup */
.vocab-popup{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#fff;border-radius:var(--radius);padding:14px 20px;box-shadow:0 4px 24px rgba(0,0,0,.18);z-index:1000;min-width:260px;max-width:90vw;border:2px solid #90c8f5}
.vocab-popup h4{color:var(--sky);font-size:.9rem;margin-bottom:6px}
.vocab-list{display:flex;flex-wrap:wrap;gap:6px}
.vocab-tag{background:#e0f0ff;color:#1a5c8c;padding:4px 10px;border-radius:50px;font-size:.8rem;font-weight:600;cursor:pointer}
.vocab-tag:hover{background:#c0e0f5}

/* Read aloud btn */
.read-aloud-btn{background:#fff;border:2px solid #90c8f5;color:var(--sky);border-radius:50px;padding:6px 14px;font-size:.82rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.2s;margin-bottom:10px}
.read-aloud-btn:hover{background:#e0f0ff}

/* Welcome banner */
.welcome-banner{background:linear-gradient(135deg,#e0f4ff,#f0e0ff);border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:14px;border:2px solid #c0d8f0}
.welcome-banner h2{font-size:1.6rem;font-weight:900;color:#1a3a5c}
.welcome-banner p{color:#555;margin-top:6px}

/* Photo upload */
.photo-upload-area{border:3px dashed #90c8f5;border-radius:var(--radius2);padding:18px;text-align:center;cursor:pointer;background:#f0f8ff;transition:.2s;margin-bottom:12px}
.photo-upload-area:hover{border-color:var(--sky);background:#e0f0ff}
.photo-preview{width:100px;height:100px;border-radius:50%;object-fit:cover;margin:8px auto;display:block;border:4px solid var(--sky)}

/* Packed items display */
.packed-list-final{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:10px}
.packed-list-item{background:#e8f8e8;border:2px solid #a0e0a0;border-radius:var(--radius2);padding:8px;text-align:center;font-size:.8rem;font-weight:700;color:#1a5c2a}
.packed-list-item .i{font-size:1.5rem}

/* Utility */
.text-center{text-align:center}
.mt-10{margin-top:10px}
.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}
.flex{display:flex}
.gap-10{gap:10px}
.align-center{align-items:center}
.flex-wrap{flex-wrap:wrap}
.hidden{display:none!important}
.badge{display:inline-block;padding:4px 12px;border-radius:50px;font-size:.78rem;font-weight:700}
.badge-blue{background:#d0eaff;color:#1a5c8c}
.badge-green{background:#d0f5e0;color:#1a5c2a}
.badge-orange{background:#fde8c0;color:#7a4a00}

@media(max-width:540px){
  .dest-grid{grid-template-columns:repeat(2,1fr)}
  .transport-grid{grid-template-columns:repeat(3,1fr)}
  .bp-details{grid-template-columns:repeat(2,1fr)}
  .seat{width:30px;height:30px;font-size:.65rem}
  .header h1{font-size:1.15rem}
}
@media(max-width:360px){
  .transport-grid{grid-template-columns:1fr}
  .dest-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="plane-icon">✈️</div>
    <div>
      <h1>My Travel Adventure</h1>
      <div style="color:#c0e4ff;font-size:.85rem;font-weight:600">Learn English • Explore the World</div>
    </div>
  </div>

  <div class="steps" id="stepsBar"></div>

  <div id="mainContent"></div>

  <button class="btn btn-restart" onclick="confirmRestart()">🔄 Restart</button>
</div>

<div id="feedbackToast" class="feedback-toast hidden"></div>
<div id="confettiContainer" class="confetti-container hidden"></div>
<div id="vocabPanel" class="vocab-popup hidden"></div>

<script>
const STATE = {
  step: 1,
  name: '', age: '', homeCountry: '',
  avatarEmoji: '', photoDataUrl: '',
  destination: null,
  transport: '',
  flight: null,
  seat: null,
  packedItems: [],
  quizScore: 0,
  boardingGate: '',
  boardingTime: ''
};

const STEPS = [
  {n:1, label:'Profile'},
  {n:2, label:'Destination'},
  {n:3, label:'Transport'},
  {n:4, label:'Flight'},
  {n:5, label:'Seat'},
  {n:6, label:'Pack'},
  {n:7, label:'Check-In'},
  {n:8, label:'Pass'},
  {n:9, label:'Takeoff'}
];

const DESTINATIONS = [
  {id:'tokyo', name:'Tokyo', country:'Japan', flag:'🇯🇵', landmark:'⛩️', weather:'🌸', desc:'Tokyo is a busy city with great food and temples.', iata:'TYO', color:'#e74c3c'},
  {id:'taipei', name:'Taipei', country:'Taiwan', flag:'🇹🇼', landmark:'🏙️', weather:'☀️', desc:'Taipei is a modern city with amazing night markets.', iata:'TPE', color:'#3498db'},
  {id:'seoul', name:'Seoul', country:'South Korea', flag:'🇰🇷', landmark:'🏯', weather:'🌤️', desc:'Seoul is a fun city with K-pop, palaces, and great food.', iata:'ICN', color:'#9b59b6'},
  {id:'bangkok', name:'Bangkok', country:'Thailand', flag:'🇹🇭', landmark:'🛕', weather:'🌞', desc:'Bangkok has beautiful temples and delicious street food.', iata:'BKK', color:'#f39c12'},
  {id:'sydney', name:'Sydney', country:'Australia', flag:'🇦🇺', landmark:'🦘', weather:'🌊', desc:'Sydney has a famous Opera House and beautiful beaches.', iata:'SYD', color:'#27ae60'},
  {id:'paris', name:'Paris', country:'France', flag:'🇫🇷', landmark:'🗼', weather:'🌂', desc:'Paris is the city of love with the famous Eiffel Tower.', iata:'CDG', color:'#e91e8c'},
  {id:'london', name:'London', country:'UK', flag:'🇬🇧', landmark:'🎡', weather:'🌧️', desc:'London has Big Ben, red buses, and lots of museums.', iata:'LHR', color:'#1a3a6c'},
  {id:'newyork', name:'New York', country:'USA', flag:'🇺🇸', landmark:'🗽', weather:'🌆', desc:'New York has the Statue of Liberty and Central Park.', iata:'JFK', color:'#e74c3c'},
];

const AVATARS = [
  {emoji:'👦', label:'Boy 1'},
  {emoji:'👧', label:'Girl 1'},
  {emoji:'🧒', label:'Child'},
  {emoji:'👨', label:'Man'},
  {emoji:'👩', label:'Woman'},
  {emoji:'🧑', label:'Person'},
  {emoji:'👲', label:'Traveler'},
  {emoji:'🧕', label:'Explorer'},
];

const ITEMS = [
  {id:'passport', emoji:'🛂', label:'Passport', good:true},
  {id:'toothbrush', emoji:'🪥', label:'Toothbrush', good:true},
  {id:'clothes', emoji:'👕', label:'Clothes', good:true},
  {id:'shoes', emoji:'👟', label:'Shoes', good:true},
  {id:'camera', emoji:'📷', label:'Camera', good:true},
  {id:'phone', emoji:'📱', label:'Phone', good:true},
  {id:'water', emoji:'🍶', label:'Water Bottle', good:true},
  {id:'sunglasses', emoji:'🕶️', label:'Sunglasses', good:true},
  {id:'fridge', emoji:'🧊', label:'Refrigerator', good:false},
  {id:'sofa', emoji:'🛋️', label:'Sofa', good:false},
  {id:'tv', emoji:'📺', label:'Television', good:false},
  {id:'washer', emoji:'🫧', label:'Washing Machine', good:false},
  {id:'elephant', emoji:'🐘', label:'Elephant', good:false},
];

const QUIZ_QUESTIONS_BUILDER = () => {
  const dest = STATE.destination || DESTINATIONS[0];
  const seat = STATE.seat || {label:'Window', row:12, col:'A'};
  const flight = STATE.flight || {num:'ESL101'};
  return [
    {
      q:`What is your name?`,
      options: shuffleArr([STATE.name, 'Captain Sky', 'Miss Journey', 'Mr. Passport']),
      answer: STATE.name,
      vocab: ['name', 'my name is']
    },
    {
      q:`Where are you going?`,
      options: shuffleArr([dest.name+', '+dest.country, 'Mars', 'Under the Sea', 'Cloud City']),
      answer: dest.name+', '+dest.country,
      vocab: ['destination', 'going to', 'travel']
    },
    {
      q:`How old are you?`,
      options: shuffleArr([STATE.age, String(Number(STATE.age)+3), String(Number(STATE.age)-2), '100']),
      answer: STATE.age,
      vocab: ['age', 'years old', 'how old']
    },
    {
      q:`What seat did you choose?`,
      options: shuffleArr([seat.label+' seat ('+seat.row+seat.col+')', 'Middle seat (3B)', 'Aisle seat (7F)', 'Window seat (2C)']),
      answer: seat.label+' seat ('+seat.row+seat.col+')',
      vocab: ['seat', 'window', 'aisle', 'middle']
    },
    {
      q:`What is your flight number?`,
      options: shuffleArr([flight.num, 'ESL999', 'AIR007', 'TW123']),
      answer: flight.num,
      vocab: ['flight', 'number', 'boarding']
    }
  ];
};

function shuffleArr(arr){return [...arr].sort(()=>Math.random()-.5)}

function renderSteps(){
  const bar = document.getElementById('stepsBar');
  bar.innerHTML = STEPS.map(s=>`
    <div class="step-dot ${STATE.step===s.n?'active':STATE.step>s.n?'done':''}" title="Step ${s.n}: ${s.label}">
      ${STATE.step>s.n?'✓':s.n}
    </div>
  `).join('');
}

function showToast(msg, type='good'){
  const t = document.getElementById('feedbackToast');
  t.textContent = msg;
  t.className = `feedback-toast ${type}`;
  setTimeout(()=>t.classList.add('hidden'),2200);
}

function speakText(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.88; u.pitch = 1.05; u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function readAloudBtn(text){
  return `<button class="read-aloud-btn" onclick="speakText(${JSON.stringify(text)})">🔊 Read Aloud</button>`;
}

function goTo(step){
  STATE.step = step;
  renderSteps();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const el = document.getElementById('mainContent');
  switch(STATE.step){
    case 1: el.innerHTML = renderStep1(); bindStep1(); break;
    case 2: el.innerHTML = renderStep2(); bindStep2(); break;
    case 3: el.innerHTML = renderStep3(); bindStep3(); break;
    case 4: el.innerHTML = renderStep4(); bindStep4(); break;
    case 5: el.innerHTML = renderStep5(); bindStep5(); break;
    case 6: el.innerHTML = renderStep6(); bindStep6(); break;
    case 7: el.innerHTML = renderStep7(); bindStep7(); break;
    case 8: el.innerHTML = renderStep8(); break;
    case 9: el.innerHTML = renderStep9(); launchConfetti(); break;
  }
}

function renderStep5(){

  const cols = ['A','B','C','D','E','F'];
  const colLabels = ['W','M','A','A','M','W'];
  let rows = '';
  for(let r=1;r<=14;r++){
    let seats = '';
    cols.forEach((col,i)=>{
      const seatId = r+col;

      seats += `${gap}<div class="seat ${isTaken?'taken':isSelected?'selected-seat':'avail'}" 
        data-id="${seatId}" data-row="${r}" data-col="${col}" data-type="${type}"
        title="${type} seat ${seatId}${isTaken?' (Taken)':''}"
        onclick="${isTaken?'':'selectSeat(\''+seatId+'\','+r+',\''+col+'\',\''+type+'\')'}">${seatId}</div>`;
    });
    rows += `<div class="seat-row"><div class="row-num">${r}</div>${seats}</div>`;
  }
  return `
  <div class="card">
    <h2><span class="icon">💺</span> Choose Your Seat</h2>
    ${readAloudBtn('Choose your seat on the airplane. Window, middle, or aisle? Green means available. Red means taken.')}

      <div class="legend-item"><div class="legend-box" style="background:#f5c8c8;border:2px solid #e74c3c"></div> Taken</div>
      <div class="legend-item"><div class="legend-box" style="background:#1a90d9;border:2px solid #0e6fb5"></div> Your Seat</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px;max-width:280px;margin-left:auto;margin-right:auto">
      <div class="seat-type-label">Window</div>
      <div class="seat-type-label" style="grid-column:span 2">Middle / Aisle / Aisle / Middle</div>
    </div>
    <div class="seat-map">
      <div class="plane-nose">✈️</div>
      ${rows}
    </div>
    ${STATE.seat ? `<div style="margin-top:12px;text-align:center;background:#d0eaff;border-radius:12px;padding:10px;font-weight:700;color:#1a3a5c">
      ✅ Your seat: <strong>${STATE.seat.id}</strong> — ${STATE.seat.label} seat (Row ${STATE.seat.row})

function renderStep6(){

          data-emoji="${item.emoji}"

      `).join('')}

      <h3>🧳 Your Suitcase ${packed.length>0?'('+packed.length+' items)':'— drag items here!'}</h3>

        ${packed.map(p=>`<div class="packed-item">${p.emoji} ${p.label} <span style="cursor:pointer;color:#e74c3c;margin-left:3px" onclick="removeItem('${p.id}')">✕</span></div>`).join('')}
      </div>

      </button>

    ${readAloudBtn('Passport. Toothbrush. Clothes. Shoes. Camera. Suitcase. Pack. Luggage.')}
    <div class="vocab-list">
      ${['passport','toothbrush','clothes','shoes','camera','suitcase','pack','luggage','carry-on','check-in','heavy','light'].map(w=>`<span class="vocab-tag" onclick="speakText('${w}')">${w}</span>`).join('')}
    </div>
  </div>`;
}

function bindStep6(){
  const grid = document.getElementById('itemsGrid');
  const drop = document.getElementById('suitcaseDrop');
  let dragId = null;
  grid.querySelectorAll('.item-card').forEach(card=>{
    card.addEventListener('dragstart', e=>{
      dragId = card.dataset.id;
      setTimeout(()=>card.classList.add('dragging'),0);
    });
    card.addEventListener('dragend', ()=>card.classList.remove('dragging'));
  });
  drop.addEventListener('dragover', e=>{e.preventDefault();drop.classList.add('dragover')});
  drop.addEventListener('dragleave', ()=>drop.classList.remove('dragover'));
  drop.addEventListener('drop', e=>{
    e.preventDefault();
    drop.classList.remove('dragover');
    if(dragId){
      const item = ITEMS.find(i=>i.id===dragId);
      if(item) addItemToSuitcase(item.id, item.good, item.label, item.emoji);
      dragId = null;
    }
  });
}

function addItemToSuitcase(id, good, label, emoji){
  good = good === true || good === 'true';
  if(STATE.packedItems.find(p=>p.id===id)){showToast(`${label} is already in the suitcase!`,'bad');return;}
  if(good){
    STATE.packedItems.push({id, label, emoji});
    speakText(`Great choice! ${label} is a useful travel item!`);
    showToast(`✅ Great choice! ${emoji} ${label}`,'good');
  } else {
    speakText(`${label}? That is too big for your suitcase!`);
    showToast(`❌ That is too big for your suitcase! 😂`,'bad');
    return;
  }
  render();
  bindStep6();
}

function removeItem(id){
  STATE.packedItems = STATE.packedItems.filter(p=>p.id!==id);
  render(); bindStep6();
}

function submitStep6(){
  if(STATE.packedItems.length < 3){showToast('Pack at least 3 items! You need things for your trip! 🧳','bad');return;}
  const hasPassport = STATE.packedItems.find(p=>p.id==='passport');
  if(!hasPassport){
    showToast('Don\'t forget your passport! 🛂','bad');
    return;
  }
  speakText(`Great packing, ${STATE.name}! You packed ${STATE.packedItems.length} items.`);
  showToast(`Perfect! You packed ${STATE.packedItems.length} items! 🎒`,'good');
  setTimeout(()=>goTo(7), 700);
}

// ─────── STEP 7: Check-In Quiz ───────
let quizState = {questions:[], current:0, score:0, answered:false};

function renderStep7(){
  quizState.questions = QUIZ_QUESTIONS_BUILDER();
  quizState.current = 0; quizState.score = 0; quizState.answered = false;
  return renderQuizQuestion();
}

function renderQuizQuestion(){
  const q = quizState.questions[quizState.current];
  const total = quizState.questions.length;
  const cur = quizState.current + 1;
  return `
  <div class="card">
    <h2><span class="icon">✅</span> Airport Check-In</h2>
    ${readAloudBtn('Answer the check-in questions. The airport officer is asking you questions!')}
    <div style="background:#e8f4ff;border-radius:12px;padding:12px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
      <span style="font-size:2rem">👩‍✈️</span>
      <div>
        <div style="font-size:.78rem;font-weight:700;color:#1a5c8c">Airport Officer</div>
        <div style="font-size:.92rem;color:#1a3a5c;font-weight:600">"Please answer a few questions."</div>
      </div>
    </div>
    <div class="quiz-progress">Question ${cur} of ${total} | Score: ${quizState.score} ⭐</div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options" id="quizOptions">
      ${q.options.map((opt,i)=>`
        <div class="quiz-opt" data-ans="${opt}" onclick="answerQuiz('${opt.replace(/'/g,"\\'")}')">
          ${['A','B','C','D'][i]}. ${opt}
        </div>
      `).join('')}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">
      <span style="font-size:.78rem;font-weight:700;color:#555">💡 Vocabulary: </span>
      ${q.vocab.map(w=>`<span class="vocab-tag" onclick="speakText('${w}')">${w}</span>`).join('')}
    </div>
  </div>`;
}

function bindStep7(){}

function answerQuiz(ans){
  if(quizState.answered) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.current];
  const opts = document.querySelectorAll('.quiz-opt');
  let correct = false;
  opts.forEach(opt=>{
    const val = opt.dataset.ans;
    if(val === q.answer){opt.classList.add('correct');}
    else if(val === ans && val !== q.answer){opt.classList.add('wrong');}
  });
  if(ans === q.answer){
    quizState.score++;
    speakText('Correct! Well done!');
    showToast('✅ Correct! Well done! ⭐','good');
  } else {
    speakText('Not quite! The correct answer is ' + q.answer);
    showToast(`❌ The answer is: ${q.answer}`,'bad');
  }
  STATE.quizScore = quizState.score;
  setTimeout(()=>{
    quizState.current++;
    quizState.answered = false;
    if(quizState.current < quizState.questions.length){
      document.getElementById('mainContent').innerHTML = renderQuizQuestion();
      bindStep7();
    } else {
      showQuizResults();
    }
  }, 1600);
}

function showQuizResults(){
  const s = quizState.score;
  const t = quizState.questions.length;
  const pct = Math.round((s/t)*100);
  const msg = pct>=80?'Excellent work! 🌟':pct>=60?'Good job! 👍':'Keep practicing! 💪';
  speakText(`You got ${s} out of ${t}! ${msg}`);
  document.getElementById('mainContent').innerHTML = `
  <div class="card" style="text-align:center">
    <h2 style="justify-content:center"><span class="icon">🎉</span> Check-In Complete!</h2>
    <div style="font-size:4rem;margin:16px 0">${pct>=80?'🌟':pct>=60?'😊':'💪'}</div>
    <div class="quiz-score">${s} / ${t} correct</div>
    <div style="font-size:1.2rem;font-weight:700;color:#555;margin-bottom:18px">${msg}</div>
    <div style="background:#e8f4ff;border-radius:12px;padding:12px;margin-bottom:16px">
      <div style="font-size:.85rem;color:#555">Your check-in is approved! ✅</div>
      <div style="font-size:.85rem;color:#555">Please proceed to the gate. 🚶</div>
    </div>
    <button class="btn btn-green" onclick="goTo(8)" style="font-size:1.1rem;padding:14px 32px">
      Get Your Boarding Pass 🎫
    </button>
  </div>`;
}

// ─────── STEP 8: Boarding Pass ───────
function renderStep8(){
  const dest = STATE.destination;
  const flight = STATE.flight || {num:'ESL101', dep:'08:00'};
  const gate = 'G' + (Math.floor(Math.random()*30)+1);
  const bTime = flight.dep ? subtractMins(flight.dep, 45) : '07:15';
  STATE.boardingGate = gate;
  STATE.boardingTime = bTime;

  const homeIata = STATE.homeCountry.substring(0,3).toUpperCase().replace(/[^A-Z]/g,'') || 'HME';
  const qrCells = generateQR();

  return `
  <div class="card">
    <h2><span class="icon">🎫</span> Your Boarding Pass</h2>
    ${readAloudBtn(`Boarding pass for ${STATE.name}. Flight ${flight.num} to ${dest.name}. Gate ${gate}. Boarding time ${bTime}.`)}
    <div class="boarding-pass" id="boardingPass">
      <div class="bp-stripe"></div>
      <div class="bp-airline">✈️ ESL AIRLINES · BOARDING PASS</div>
      <div class="bp-route">
        <div class="bp-city">
          <div class="bp-iata">${homeIata}</div>
          <div class="bp-cityname">${STATE.homeCountry.substring(0,12)}</div>
        </div>
        <div class="bp-arrow">→</div>
        <div class="bp-city">
          <div class="bp-iata">${dest.iata}</div>
          <div class="bp-cityname">${dest.name}</div>
        </div>
      </div>
      <div class="bp-details">
        <div class="bp-field"><label>Flight</label><span>${flight.num}</span></div>
        <div class="bp-field"><label>Date</label><span>${getTodayDate()}</span></div>
        <div class="bp-field"><label>Class</label><span>Economy</span></div>
        <div class="bp-field"><label>Seat</label><span>${STATE.seat?STATE.seat.id:'12A'}</span></div>
        <div class="bp-field"><label>Gate</label><span>${gate}</span></div>
        <div class="bp-field"><label>Boards</label><span>${bTime}</span></div>
      </div>
      <hr class="bp-divider">
      <div class="bp-bottom">
        <div class="bp-avatar">
          ${STATE.photoDataUrl ? `<img src="${STATE.photoDataUrl}" alt="photo">` : `<span style="font-size:2.4rem">${STATE.avatarEmoji||'🧑‍✈️'}</span>`}
        </div>
        <div class="bp-pax">
          <div class="bp-pax-name">${STATE.name.toUpperCase()}</div>
          <div class="bp-pax-info">Age: ${STATE.age} · From: ${STATE.homeCountry}</div>
          <div class="bp-pax-info">${STATE.seat?STATE.seat.label+' seat':''}</div>
        </div>
        <div class="bp-qr">${qrCells}</div>
      </div>
      <div class="bp-gate">🚪 GATE ${gate} · BOARDING ${bTime}</div>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button class="btn btn-green" onclick="goTo(9)" style="font-size:1.1rem;padding:14px 32px">
        🛫 Take Off! Let's Go!
      </button>
    </div>
  </div>`;
}

function subtractMins(timeStr, mins){
  const [h,m] = timeStr.split(':').map(Number);
  const total = h*60+m-mins;
  const nh = Math.floor(total/60); const nm = total%60;
  return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
}
function getTodayDate(){
  const d = new Date();
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
}
function generateQR(){
  let svg = `<svg width="56" height="56" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">`;
  const seed = (STATE.name+STATE.destination?.id||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  for(let r=0;r<7;r++){for(let c=0;c<7;c++){
    const on = (seed*(r+1)*(c+1))%3!==0||(r<2&&c<2)||(r<2&&c>4)||(r>4&&c<2);
    if(on) svg+=`<rect x="${c*8}" y="${r*8}" width="7" height="7" fill="#1a3a6c"/>`;
  }}
  svg += `</svg>`;
  return svg;
}

// ─────── STEP 9: Takeoff ───────
function renderStep9(){
  const dest = STATE.destination;
  return `
  <div class="takeoff-screen">
    <div class="takeoff-plane">✈️</div>
    <div class="takeoff-msg">Have a great trip, ${STATE.name}!</div>
    <div class="dest-showcase">${dest.flag}</div>
    <div style="font-size:1.4rem;font-weight:700;color:#1a3a5c;margin-bottom:8px">
      You are flying to ${dest.name}, ${dest.country}! ${dest.landmark}
    </div>
    <div style="font-size:.95rem;color:#555;margin-bottom:20px">${dest.desc}</div>
    ${readAloudBtn(`Congratulations ${STATE.name}! You are flying to ${dest.name}, ${dest.country}! Have a great trip!`)}
    <div class="card" style="max-width:440px;margin:16px auto;text-align:left">
      <h2 style="font-size:1.1rem"><span class="icon">📋</span> Your Trip Summary</h2>
      <div style="display:grid;gap:8px;font-size:.88rem">
        <div>👤 <b>Traveler:</b> ${STATE.name}, Age ${STATE.age}</div>
        <div>🌏 <b>From:</b> ${STATE.homeCountry}</div>
        <div>📍 <b>To:</b> ${dest.name}, ${dest.country} ${dest.flag}</div>
        <div>✈️ <b>Flight:</b> ${STATE.flight?STATE.flight.num:'ESL101'} · Departs ${STATE.flight?STATE.flight.dep:'08:00'}</div>
        <div>💺 <b>Seat:</b> ${STATE.seat?STATE.seat.id+' ('+STATE.seat.label+')':'Window seat'}</div>
        <div>🚪 <b>Gate:</b> ${STATE.boardingGate}</div>
        <div>🧳 <b>Packed:</b> ${STATE.packedItems.map(p=>p.emoji+p.label).join(', ')||'Nothing!'}</div>
        <div>⭐ <b>Check-In Score:</b> ${STATE.quizScore}/5</div>
      </div>
    </div>
    <div class="card" style="max-width:440px;margin:0 auto;background:linear-gradient(135deg,#e0f4ff,#f0e0ff)">
      <h2 style="font-size:1.1rem"><span class="icon">📚</span> What You Learned Today</h2>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
        ${['traveler','destination','flight','boarding pass','passport','suitcase','seat','gate','departure','arrival','check-in','luggage'].map(w=>`<span class="vocab-tag" onclick="speakText('${w}')">${w}</span>`).join('')}
      </div>
    </div>
    <div style="margin-top:20px">
      <button class="btn btn-orange" onclick="confirmRestart()" style="font-size:1rem;padding:12px 28px">
        🔄 Play Again
      </button>
    </div>
  </div>`;
}

function launchConfetti(){
  speakText(`Congratulations, ${STATE.name}! Have a great trip to ${STATE.destination?STATE.destination.name:'your destination'}!`);
  const container = document.getElementById('confettiContainer');
  container.classList.remove('hidden');
  container.innerHTML = '';
  const colors = ['#FFD700','#e74c3c','#3498db','#2ecc71','#9b59b6','#e91e8c','#f39c12'];
  for(let i=0;i<60;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${2.5+Math.random()*2}s;
      animation-delay:${Math.random()*1.5}s;
      width:${8+Math.random()*8}px;
      height:${10+Math.random()*10}px;
      transform:rotate(${Math.random()*360}deg);
    `;
    container.appendChild(piece);
  }
  setTimeout(()=>{container.classList.add('hidden');container.innerHTML='';}, 5000);
}

function confirmRestart(){
  if(confirm('Are you sure you want to restart? Your progress will be lost. 🔄')){
    restartGame();
  }
}

function restartGame(){
  Object.assign(STATE, {
    step:1, name:'', age:'', homeCountry:'',
    avatarEmoji:'', photoDataUrl:'',
    destination:null, transport:'', flight:null,
    seat:null, packedItems:[], quizScore:0,
    boardingGate:'', boardingTime:''
  });
  quizState = {questions:[], current:0, score:0, answered:false};
  goTo(1);
}

// Init
renderSteps();
render();
</script>
